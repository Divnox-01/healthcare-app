version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: healthcare_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - healthcare-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - healthcare-network

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/healthcare_db?schema=public
      - JWT_SECRET=supersafe_production_jwt_secret_key
      - PORT=5000
    depends_on:
      - postgres
      - redis
    networks:
      - healthcare-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - healthcare-network

volumes:
  pgdata:

networks:
  healthcare-network:
    driver: bridge
